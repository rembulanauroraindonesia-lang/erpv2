{% extends "shared/_base.html" %}

{% block title %}Buat Pickup Order — RAI ERP{% endblock %}
{% block page_title %}
<div class="flex items-center gap-3">
    <a href="/app/pickup-order" class="text-gray-400 hover:text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>
    Buat Pickup Order
</div>
{% endblock %}

{% block content %}
<div x-data="puBuilder()">
    <!-- Header -->
    <div class="bg-white rounded-lg border p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Supplier</label>
                <select x-model="selectedSupplier" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <option value="">-- Pilih Supplier --</option>
                    {% for c in suppliers %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Pickup</label>
                <input type="date" x-model="pickupDate" class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">No. Polisi</label>
                <input type="text" x-model="vehiclePlate" placeholder="B 1234 XYZ"
                       class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
                <textarea x-model="notes" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
            </div>
        </div>
    </div>

    <!-- Items Table -->
    <div class="bg-white rounded-lg border mb-6 overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-500 w-10">#</th>
                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-500 min-w-[200px]">Item</th>
                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-500 w-28">Qty</th>
                    <th class="px-3 py-2 w-10"></th>
                </tr>
            </thead>
            <tbody>
                <template x-for="(item, index) in items" :key="index">
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-3 py-2 text-gray-500" x-text="index + 1"></td>
                        <td class="px-3 py-2">
                            <select x-model="item.item_id" class="w-full px-2 py-1 border rounded text-sm">
                                <option value="">-- Pilih --</option>
                                {% for i in items %}
                                <option value="{{ i.id }}">{{ i.name }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td class="px-3 py-2">
                            <input type="number" x-model.number="item.quantity" min="0" step="0.01"
                                   class="w-full px-2 py-1 border rounded text-sm text-right">
                        </td>
                        <td class="px-3 py-2">
                            <button @click="removeItem(index)" class="text-red-500 hover:text-red-700">✕</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <button @click="addItem()" class="px-4 py-2 border border-dashed border-gray-400 text-gray-600 rounded-lg hover:bg-gray-50 text-sm mb-6">
        + Tambah Item
    </button>

    <!-- Actions -->
    <div class="flex gap-3">
        <button @click="save()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Simpan</button>
        <a href="/app/pickup-order" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm font-medium">Batal</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function puBuilder() {
    return {
        items: [],
        selectedSupplier: '',
        pickupDate: new Date().toISOString().split('T')[0],
        vehiclePlate: '',
        notes: '',

        init() {},

        addItem() {
            this.items.push({ item_id: '', quantity: 1, urutan: this.items.length, notes: '' });
        },

        removeItem(index) { this.items.splice(index, 1); },

        async save() {
            const body = {
                supplier_id: this.selectedSupplier || null,
                pickup_date: this.pickupDate || null,
                vehicle_plate: this.vehiclePlate || null,
                notes: this.notes || null,
                items: this.items.filter(i => i.item_id),
            };

            const res = await fetch('/api/pickup-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });

            if (res.ok) {
                const data = await res.json();
                window.location.href = '/app/pickup-order/' + data.id;
            } else {
                const err = await res.json();
                alert('Gagal: ' + (err.detail || 'Error'));
            }
        },
    };
}
</script>
{% endblock %}
