<form {% if item %}
      hx-patch="/api/items/{{ item.id }}"
      {% else %}
      hx-post="/api/items"
      {% endif %}
      hx-target="body"
      class="space-y-4">
    <h3 class="text-lg font-semibold">
        {% if item %}Edit Item{% else %}Tambah Item{% endif %}
    </h3>

    <div>
        <label class="block text-sm font-medium mb-1">Nama</label>
        <input type="text" name="name" required value="{{ item.name if item else '' }}"
               class="w-full border rounded-lg px-3 py-2 text-sm">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-sm font-medium mb-1">SKU</label>
            <input type="text" name="sku" value="{{ item.sku if item else '' }}"
                   class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Unit</label>
            <input type="text" name="unit" value="{{ item.unit if item else 'pcs' }}"
                   class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">HPP Default</label>
        <input type="number" name="default_hpp" step="0.01" min="0"
               value="{{ item.default_hpp if item else '0' }}"
               class="w-full border rounded-lg px-3 py-2 text-sm">
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Catatan</label>
        <textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm">{{ item.notes if item else '' }}</textarea>
    </div>

    <div class="flex gap-2 justify-end pt-2">
        <button type="button" @click="$dispatch('close-modal')"
                class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">
            Batal
        </button>
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
            {% if item %}Simpan Perubahan{% else %}Tambah{% endif %}
        </button>
    </div>
</form>
